<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJ Tech — Panel de control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBP4ZndVTHdFGtPmicOsdE3dq1UbUDWPLc",
  authDomain: "tjtech-panel.firebaseapp.com",
  projectId: "tjtech-panel",
  storageBucket: "tjtech-panel.firebasestorage.app",
  messagingSenderId: "567212197010",
  appId: "1:567212197010:web:75833f71f19c04b5d6d24b"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── LOGIN ──────────────────────────────────────────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  err.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = 'Email o contraseña incorrectos.';
  }
};

window.doLogout = () => signOut(auth);

// Enter en login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    window.doLogin();
  }
});

// ── AUTH STATE ─────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  const loginScreen = document.getElementById('login-screen');
  const appScreen   = document.getElementById('app-screen');
  if (user) {
    loginScreen.style.display = 'none';
    appScreen.style.display   = 'flex';
    document.getElementById('user-email').textContent = user.email;
    initFirestore();
  } else {
    loginScreen.style.display = 'flex';
    appScreen.style.display   = 'none';
  }
});

// ── FIRESTORE ──────────────────────────────────────────────────────────────
const COLLECTIONS = {p:'productos', l:'lotes', v:'ventas', g:'gastos', u:'usd', d:'devoluciones'};
let fsUnsubscribes = [];

async function initFirestore() {
  // Cancelar listeners anteriores
  fsUnsubscribes.forEach(u => u());
  fsUnsubscribes = [];

  // Escuchar cambios en tiempo real para cada colección
  for (const [key, col] of Object.entries(COLLECTIONS)) {
    const ref = doc(db, 'tjtech', col);
    const unsub = onSnapshot(ref, snap => {
      if (snap.exists()) {
        const data = snap.data().items || [];
        if (JSON.stringify(window.DB[key]) !== JSON.stringify(data)) {
          window.DB[key] = data;
          if (window.rview) window.rview();
        }
      }
    });
    fsUnsubscribes.push(unsub);
  }

  // Cargar config y sincronizar con CFG local
  try {
    const cfgSnap = await getDoc(doc(db, 'tjtech', 'config'));
    if (cfgSnap.exists()) {
      const saved = cfgSnap.data();
      window.CFG = {...window.CFG, ...saved};
      // Sincronizar con el objeto CFG del script principal
      Object.assign(window.CFG, saved);
      // Notificar al script principal vía evento
      window.dispatchEvent(new CustomEvent('cfg-loaded', {detail: saved}));
    }
  } catch {}

  if (window.rnav) window.rnav();
  if (window.rview) window.rview();
}

// Sobreescribir dbSave para usar Firestore
window.dbSaveFS = async (key) => {
  try {
    const col = COLLECTIONS[key];
    if (!col) return;
    await setDoc(doc(db, 'tjtech', col), { items: window.DB[key] });
  } catch(e) {
    console.error('Error guardando en Firestore:', e);
  }
};

window.cfgSaveFS = async () => {
  try {
    await setDoc(doc(db, 'tjtech', 'config'), window.CFG);
  } catch(e) {
    console.error('Error guardando config:', e);
  }
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* TJ Tech brand */
    --brand:        #2B7070;
    --brand-dark:   #1d5454;
    --brand-light:  #45CECE;
    --brand-bg:     #eaf5f5;
    --brand-border: #b2dede;

    --bg:     #f4f6f6;
    --bg2:    #ffffff;
    --bg3:    #eaf5f5;
    --border: #dde8e8;
    --border2:#c5d8d8;
    --text:   #0f2424;
    --text2:  #4a6666;
    --text3:  #82a0a0;

    --green:        #16a34a;
    --green-bg:     #f0fdf4;
    --green-border: #bbf7d0;
    --amber:        #d97706;
    --amber-bg:     #fffbeb;
    --amber-border: #fde68a;
    --red:          #dc2626;
    --red-bg:       #fef2f2;
    --red-border:   #fecaca;
    --blue:         #2B7070;
    --blue-bg:      #eaf5f5;
    --blue-border:  #b2dede;

    --radius: 10px;
    --radius-sm: 6px;
    --font-mono: 'JetBrains Mono', monospace;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ─── LAYOUT ─── */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 225px;
    background: var(--brand);
    border-right: none;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 1.4rem 1.25rem 1.2rem;
    border-bottom: 1px solid rgba(255,255,255,.12);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-text .name {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.2px;
    line-height: 1.1;
  }
  .logo-text .sub {
    font-size: 10px;
    color: rgba(255,255,255,.5);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 2px;
  }

  nav { padding: .75rem; flex: 1; overflow-y: auto; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 9px 11px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: rgba(255,255,255,.62);
    border-radius: var(--radius-sm);
    text-align: left;
    transition: background .12s, color .12s;
    margin-bottom: 2px;
  }
  .nav-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
  .nav-btn.active { background: rgba(255,255,255,.18); color: #fff; font-weight: 600; }
  .nav-btn.active .nav-icon { color: var(--brand-light); }
  .nav-icon { width: 16px; text-align: center; font-size: 14px; flex-shrink: 0; color: rgba(255,255,255,.45); }

  .sidebar-footer {
    padding: .75rem 1rem;
    border-top: 1px solid rgba(255,255,255,.1);
    font-size: 11px;
    color: rgba(255,255,255,.3);
  }

  .main {
    margin-left: 225px;
    flex: 1;
    padding: 2rem 2rem 4rem;
    max-width: 1100px;
  }

  /* ─── CARDS ─── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .card-body { padding: 1.25rem; }

  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .metric {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .metric-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 600; font-family: var(--font-mono); letter-spacing: -.5px; }
  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .metric-value.red { color: var(--red); }
  .metric-value.blue { color: var(--brand); }

  /* ─── PAGE HEADER ─── */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .page-title { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    font-size: 13px; font-family: inherit; font-weight: 500;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg3); border-color: var(--border2); }
  .btn-primary {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }
  .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
  .btn-danger { color: var(--red); border-color: var(--red-border); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-seg {
    padding: 6px 12px; font-size: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    font-family: inherit; cursor: pointer;
    transition: all .12s;
  }
  .btn-seg.active { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 500; }

  /* ─── TABLE ─── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .mono { font-family: var(--font-mono); font-size: 13px; }

  /* ─── BADGES ─── */
  .badge {
    display: inline-block; padding: 3px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-red   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }
  .badge-blue  { background: var(--blue-bg);  color: var(--blue);  border: 1px solid var(--blue-border); }

  /* ─── EMPTY STATE ─── */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: .75rem; }
  .empty-text { font-size: 14px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.45);
    display: none; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    width: 100%; max-width: 560px;
    animation: mIn .15s ease;
  }
  @keyframes mIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .modal-header {
    padding: 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; line-height: 1; color: var(--text2); padding: 0 2px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 1.25rem; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* ─── FORMS ─── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    font-size: 13px; font-family: inherit;
    transition: border-color .12s, box-shadow .12s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(43,112,112,.15);
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .span2 { grid-column: span 2; }

  /* ─── LOT/SALE ITEMS ─── */
  .item-row {
    display: grid; grid-template-columns: 1fr 80px 110px 30px;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .item-row select, .item-row input { margin: 0; }
  .item-total { text-align: right; font-family: var(--font-mono); font-size: 13px; font-weight: 500; margin: 8px 0 0; }

  /* ─── RESULTADOS ─── */
  .res-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-top: 1px solid var(--border);
  }
  .res-row .label { font-size: 14px; color: var(--text); }
  .res-row .val { font-family: var(--font-mono); font-weight: 500; font-size: 14px; }
  .res-row .pct { font-size: 11px; color: var(--text3); margin-left: 8px; }
  .res-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-radius: var(--radius-sm); margin-top: 10px;
  }
  .res-total .label { font-size: 15px; font-weight: 600; }
  .res-total .val { font-family: var(--font-mono); font-size: 22px; font-weight: 600; }
  .res-total.pos { background: var(--green-bg); color: var(--green); }
  .res-total.neg { background: var(--red-bg); color: var(--red); }

  /* ─── ALERT STRIP ─── */
  .alert-strip {
    background: var(--red-bg); border: 1px solid var(--red-border);
    border-radius: var(--radius); padding: .75rem 1.25rem; margin-bottom: 1.25rem;
  }
  .alert-strip-title { font-size: 12px; font-weight: 600; color: var(--red); margin-bottom: 6px; }
  .alert-chips { display: flex; flex-wrap: wrap; gap: 6px; }

  /* ─── FILTROS ESTILO EXCEL ─── */
  .th-filter {
    position: relative;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .th-filter:hover { background: rgba(255,255,255,.15); }
  .th-inner { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .th-sort-icon { font-size: 10px; opacity: .6; flex-shrink: 0; }
  .th-filter.filtered .th-sort-icon { color: var(--brand-light); opacity: 1; }
  .th-filter.sorted-asc .th-sort-icon::after  { content: ' ▲'; }
  .th-filter.sorted-desc .th-sort-icon::after { content: ' ▼'; }

  .filter-dropdown {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    z-index: 9999;
    min-width: 220px;
    max-width: 280px;
    padding: 10px;
    display: none;
  }
  .filter-dropdown.open { display: block; }
  .filter-search {
    width: 100%; padding: 6px 8px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    font-size: 12px; font-family: inherit;
    background: var(--bg); margin-bottom: 6px;
  }
  .filter-search:focus { outline: none; border-color: var(--brand); }
  .filter-sort-btns { display: flex; gap: 4px; margin-bottom: 8px; }
  .filter-sort-btn {
    flex: 1; padding: 5px 6px; font-size: 11px; font-family: inherit;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg); cursor: pointer; color: var(--text2);
    transition: all .1s;
  }
  .filter-sort-btn:hover { background: var(--bg3); color: var(--brand); border-color: var(--brand); }
  .filter-sort-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .filter-options { max-height: 200px; overflow-y: auto; }
  .filter-option {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 2px; font-size: 12px; cursor: pointer;
    border-radius: 4px;
  }
  .filter-option:hover { background: var(--bg3); }
  .filter-option input[type=checkbox] { cursor: pointer; accent-color: var(--brand); }
  .filter-actions {
    display: flex; gap: 6px; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .filter-apply {
    flex: 1; padding: 6px; font-size: 12px; font-family: inherit;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;
  }
  .filter-clear {
    padding: 6px 10px; font-size: 12px; font-family: inherit;
    background: var(--bg); color: var(--text2);
    border: 1px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer;
  }
  .filter-badge {
    display: inline-block; background: var(--brand-light); color: var(--brand-dark);
    border-radius: 10px; font-size: 10px; font-weight: 700;
    padding: 1px 5px; margin-left: 3px;
  }
  .chart-wrap { padding: 1.25rem; }
  .chart-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 1rem; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; }
    .main { margin-left: 0; padding: 1rem; }
    .metric-grid { grid-template-columns: 1fr 1fr; }
    .grid2 { grid-template-columns: 1fr; }
    .span2 { grid-column: span 1; }
  }
</style>
</head>
<body>

<!-- ── PANTALLA DE LOGIN ──────────────────────────────────────────────── -->
<div id="login-screen" style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--brand-dark)">
  <div style="background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div style="text-align:center;margin-bottom:2rem">
      <svg width="60" height="60" viewBox="0 0 44 44" style="margin-bottom:12px">
        <circle cx="22" cy="22" r="20" stroke="#2B7070" stroke-width="2.5" fill="none"/>
        <text x="22" y="17" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="11" fill="#2B7070">TJ</text>
        <text x="22" y="29" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="8.5" fill="#45CECE" letter-spacing="1.5">TECH</text>
      </svg>
      <div style="font-size:20px;font-weight:700;color:#0f2424;letter-spacing:-.3px">TJ Tech</div>
      <div style="font-size:13px;color:#82a0a0;margin-top:4px">Panel de control</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:12px;font-weight:500;color:#4a6666;display:block;margin-bottom:5px">Email</label>
      <input id="login-email" type="email" placeholder="tu@email.com"
        style="width:100%;padding:10px 12px;border:1px solid #dde8e8;border-radius:8px;font-size:14px;font-family:inherit;outline:none"
        onfocus="this.style.borderColor='#2B7070'" onblur="this.style.borderColor='#dde8e8'">
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:12px;font-weight:500;color:#4a6666;display:block;margin-bottom:5px">Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••••"
        style="width:100%;padding:10px 12px;border:1px solid #dde8e8;border-radius:8px;font-size:14px;font-family:inherit;outline:none"
        onfocus="this.style.borderColor='#2B7070'" onblur="this.style.borderColor='#dde8e8'">
    </div>
    <div id="login-err" style="font-size:12px;color:#dc2626;min-height:18px;margin-bottom:8px"></div>
    <button onclick="doLogin()"
      style="width:100%;padding:11px;background:#2B7070;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">
      Ingresar
    </button>
  </div>
</div>

<!-- ── APLICACIÓN ─────────────────────────────────────────────────────── -->
<div id="app-screen" style="display:none">

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <!-- Logo TJ Tech recreado en SVG -->
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">

// ─── STOCK CALC (FIFO) ────────────────────────────────────────────────────────
function stockProd(prod) {
  // Lotes ordenados por fecha (más viejo primero = FIFO)
  const lotItems = DB.l.flatMap(l =>
    (l.items||[])
      .filter(i => i.pid === prod.id)
      .map(i => ({ qty: i.qty||0, costo: i.costo||0, fecha: l.fecha||'' }))
  ).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

  // Total vendido (ventas directas + items de ventas multi-producto)
  const vi = DB.v.filter(v => v.pid === prod.id).map(v => ({ qty: v.cantidad||0 }))
    .concat(DB.v.flatMap(v => (v.items||[]).filter(i => i.pid === prod.id && !v.pid).map(i => ({ qty: i.qty||0 }))));
  const di         = (DB.d||[]).filter(d => d.pid === prod.id).reduce((s,d) => s + (d.cantidad||1), 0);
  const totalComp  = lotItems.reduce((s,i) => s + i.qty, 0);
  const totalVend  = vi.reduce((s,i) => s + i.qty, 0) - di;
  const stock      = totalComp - totalVend;

  // FIFO: consumir desde el lote más viejo
  let porConsumir    = Math.max(0, totalVend);
  let costoRestante  = 0;
  let unidRestantes  = 0;

  for (const item of lotItems) {
    if (porConsumir <= 0) {
      // Lote con stock disponible completo
      costoRestante += item.qty * item.costo;
      unidRestantes += item.qty;
    } else if (porConsumir < item.qty) {
      // Lote con stock parcial
      const disponible = item.qty - porConsumir;
      costoRestante += disponible * item.costo;
      unidRestantes += disponible;
      porConsumir = 0;
    } else {
      // Lote agotado
      porConsumir -= item.qty;
    }
  }

  const cp = unidRestantes > 0 ? costoRestante / unidRestantes : (prod.costoBase || 0);
  return { stock, cp };
}

function dashFilter(arr, dk) {
  const now = new Date();
  if (dashPer === 'anioSel' && dashAnio) {
    return arr.filter(x => new Date(x[dk]).getFullYear() === dashAnio);
  }
  if (dashPer === 'semana') {
    const lun = new Date(now);
    lun.setDate(now.getDate() - now.getDay() + (now.getDay()===0?-6:1));
    lun.setHours(0,0,0,0);
    return arr.filter(x => new Date(x[dk]) >= lun);
  }
  if (dashPer === 'mes') {
    return arr.filter(x => { const d=new Date(x[dk]); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  }
  if (dashPer === 'anio') {
    return arr.filter(x => new Date(x[dk]).getFullYear()===now.getFullYear());
  }
  return arr;
}

// ─── PRODUCTOS ────────────────────────────────────────────────────────────────
// Calcula stock mínimo sugerido basado en historial de 90 días y cobertura de 45 días
function stockMinSugerido(prod) {
  const ahora  = new Date();
  const desde  = new Date(ahora); desde.setDate(ahora.getDate() - 90);
  const ventas = DB.v.filter(v => v.pid===prod.id && new Date(v.fecha)>=desde);
  const unids  = ventas.reduce((s,v)=>s+(v.cantidad||1),0);
  const promDiario = unids / 90;
  return Math.ceil(promDiario * 45); // 45 días de cobertura
}

// Días de stock restantes al ritmo actual
function diasStock(prod, stockActual) {
  const ahora = new Date();
  const desde = new Date(ahora); desde.setDate(ahora.getDate() - 90);
  const ventas = DB.v.filter(v => v.pid===prod.id && new Date(v.fecha)>=desde);
  const unids  = ventas.reduce((s,v)=>s+(v.cantidad||1),0);
  const promDiario = unids / 90;
  if (!promDiario) return null;
  return Math.floor(stockActual / promDiario);
}

function vProd() {
  const rows = DB.p.map(p => {
    const st     = stockProd(p);
    const mg     = st.cp > 0 ? (p.precioVenta - st.cp) / st.cp * 100 : 0;
    const minSug = stockMinSugerido(p);
    const dias   = diasStock(p, st.stock);

    // Estado del stock
    let sc, alarmHtml = '';
    if (st.stock <= 0) {
      sc = 'red';
      alarmHtml = `<div style="font-size:11px;color:var(--red);margin-top:3px;font-weight:500">🔴 Sin stock</div>`;
    } else if (minSug > 0 && st.stock <= minSug) {
      sc = 'red';
      alarmHtml = `<div style="font-size:11px;color:var(--red);margin-top:3px;font-weight:500">🔴 Stock crítico${dias!==null?` · ${dias} días restantes`:''}</div>`;
    } else if (minSug > 0 && st.stock <= minSug * 1.5) {
      sc = 'amber';
      alarmHtml = `<div style="font-size:11px;color:var(--amber);margin-top:3px;font-weight:500">🟡 Pedido pronto${dias!==null?` · ${dias} días restantes`:''}</div>`;
    } else {
      sc = 'green';
      if (dias !== null) alarmHtml = `<div style="font-size:11px;color:var(--text3);margin-top:3px">${dias} días de stock</div>`;
    }

    return `<tr style="${sc==='red'?'background:var(--red-bg)':sc==='amber'?'background:var(--amber-bg)':''}">
      <td>
        <strong>${p.nombre}</strong>
        ${p.descripcion?`<br><span style="font-size:11px;color:var(--text3)">${p.descripcion}</span>`:''}
      </td>
      <td>${p.unidad||'—'}</td>
      <td>
        <span class="badge badge-${sc}" style="font-size:13px;font-weight:700">${st.stock}</span>
        ${alarmHtml}
      </td>
      <td class="mono" style="font-size:12px;color:var(--text2)">${minSug>0?minSug:'Sin historial'}</td>
      <td class="mono">${ARS(st.cp)}</td>
      <td class="mono">${ARS(p.precioVenta||0)}</td>
      <td class="mono" style="color:${mg>0?'var(--green)':'var(--red)'}">${mg.toFixed(0)}%</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm" onclick="oEditP('${p.id}')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="dProd('${p.id}')">Eliminar</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Alarmas activas
  const criticos = DB.p.filter(p=>{const st=stockProd(p);const m=stockMinSugerido(p);return st.stock<=0||(m>0&&st.stock<=m);});
  const alertHtml = criticos.length ? `
    <div class="alert-strip" style="margin-bottom:1.25rem">
      <div class="alert-strip-title">🔴 Stock crítico o agotado — pedido urgente recomendado</div>
      <div class="alert-chips">${criticos.map(p=>{
        const st=stockProd(p); const d=diasStock(p,st.stock);
        return `<span class="badge badge-red">${p.nombre}: ${st.stock} ud${d!==null?` · ${d}d`:''}`;
      }).join('')}</div>
    </div>` : '';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Productos</div>
        <div class="page-sub">${DB.p.length} producto${DB.p.length!==1?'s':''} · Stock mínimo calculado sobre 90 días de ventas, cobertura 45 días</div>
      </div>
      <button class="btn btn-primary" onclick="oNewP()">+ Nuevo producto</button>
    </div>
    ${alertHtml}
    <div class="card">
      <div class="tbl-wrap">
        <table id="tbl-prod">
          <thead><tr>
            ${fth('Nombre','tbl-prod',0)}${fth('Unidad','tbl-prod',1)}${fth('Stock','tbl-prod',2)}${fth('Mín. sugerido','tbl-prod',3)}${fth('Costo prom.','tbl-prod',4)}${fth('P. venta','tbl-prod',5)}${fth('Margen','tbl-prod',6)}<th></th>
          </tr></thead>
          <tbody>${rows||`<tr><td colspan="8"><div class="empty"><div class="empty-icon">▦</div><div class="empty-text">Sin productos. Agregá el primero.</div></div></td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
}

function calcLoteItem(it, tc) {
  const cant        = +it.qty    || 0;
  const alibaba     = +it.alibaba || 0; // USD por unidad
  const envioChina  = +it.envioChina  || 0; // USD total
  const impCompra   = +it.impCompra   || 0; // USD total
  const impTarjeta  = +it.impTarjeta  || 0; // USD total
  const impImport   = +it.impImport   || 0; // USD total
  const totalUSD    = (alibaba * cant) + envioChina + impCompra + impTarjeta + impImport;
  const unitUSD     = cant > 0 ? totalUSD / cant : 0;
  const totalARS    = totalUSD * (tc || 0);
  const unitARS     = cant > 0 ? totalARS / cant : 0;
  return {cant, alibaba, envioChina, impCompra, impTarjeta, impImport, totalUSD, unitUSD, totalARS, unitARS};
}

function recalcLotRow(i) {
  const tc  = +lF.tc || 0;
  const it  = lI[i];
  const c   = calcLoteItem(it, tc);
  const set = (id, v) => { const el=document.getElementById(id); if(el) el.value=v; };
  set(`li-tusd-${i}`,  c.totalUSD.toFixed(2));
  set(`li-uusd-${i}`,  c.unitUSD.toFixed(2));
  set(`li-tars-${i}`,  Math.round(c.totalARS).toLocaleString('es-AR'));
  set(`li-uars-${i}`,  Math.round(c.unitARS).toLocaleString('es-AR'));
  // actualizar costo para stockProd (en ARS por unidad)
  lI[i].costo = c.unitARS;
}

// ─── VENTAS ───────────────────────────────────────────────────────────────────
function calcVenta(f) {
  const cant      = +f.cantidad||0;
  const pv        = +f.precioVenta||0;
  const bruto     = pv * cant;
  // Usar valor manual si fue editado, si no calcular automático
  const comML     = f.canal==='Meli'
    ? (f.comMLManual!=null ? +f.comMLManual : bruto * (CFG.mlComision/100))
    : 0;
  const envio     = f.canal==='Meli'
    ? (f.envioManual!=null ? +f.envioManual : (CFG.costoEnvioMeli||0) * cant)
    : 0;
  const iibb      = +f.iibb||0;
  const facturacion  = bruto - comML - envio - iibb;
  const costoTotal   = (+f.costoU||0) * cant;
  const margenBruto  = facturacion - costoTotal;
  const tc           = +f.tc||0;
  const facturacionUSD = tc ? facturacion/tc : 0;
  const gananciaUSD    = tc ? margenBruto/tc  : 0;
  return {bruto,comML,envio,iibb,facturacion,costoTotal,margenBruto,tc,facturacionUSD,gananciaUSD};
}

function recalcVF(resetManual) {
  // Si cambia canal o cantidad, resetear los manuales
  if (resetManual) { vF.comMLManual = null; vF.envioManual = null; }
  const c = calcVenta(vF);
  const set = (id,v,fmt) => { const el=document.getElementById(id); if(el) el.value=fmt?fmt(v):(v||''); };
  // Solo actualizar comML y envio si no fueron editados manualmente
  if (vF.comMLManual==null) set('vf-comml', c.comML, v=>v||v===0?v:'');
  if (vF.envioManual==null) set('vf-envio', c.envio, v=>v||v===0?v:'');
  set('vf-fact',    c.facturacion, ARS);
  set('vf-mb',      c.margenBruto, ARS);
  set('vf-fusd',    c.facturacionUSD, v=>v?'USD '+v.toFixed(2):'—');
  set('vf-gusd',    c.gananciaUSD,    v=>v?'USD '+v.toFixed(2):'—');
  const mbEl = document.getElementById('vf-mb');
  if(mbEl) mbEl.style.color = c.margenBruto>=0?'var(--green)':'var(--red)';
}

async function oNewV() {
  const tc = await fetchTC();
  // Sugerir próxima FC basada en la última venta Meli
  const lastMeli = [...DB.v].reverse().find(v => v.canal === 'Meli' && v.factura);
  let nextFC = '';
  if (lastMeli && lastMeli.factura) {
    const num = parseInt(lastMeli.factura.replace(/\D/g,''));
    if (!isNaN(num)) {
      // Mantener prefijo si lo hay (ej: "FC-001" → "FC-002")
      const prefix = lastMeli.factura.replace(/\d+$/, '');
      const digits = lastMeli.factura.match(/\d+$/)?.[0] || '';
      nextFC = prefix + String(num + 1).padStart(digits.length, '0');
    }
  }
  vF = {
    fecha:hoy(), factura:nextFC, cliente:'', pid:'', canal:'Meli',
    cantidad:1, precioVenta:0, costoU:0, iibb:0,
    comMLManual:null, envioManual:null,
    tc: tc||'', medioCobro:'Transferencia', estado:'cobrado'
  };
  mOpen('Nueva venta', buildVentForm(), 'saveVent()');
}

function saveVent() {
  if (!vF.pid) return alert('Seleccioná un producto');

  if (st.stock < vF.cantidad) return alert(`Stock insuficiente para "${p.nombre}" (disponible: ${st.stock})`);
  const c = calcVenta(vF);

const DEV_MOTIVOS  = ['Arrepentimiento','Problema del producto'];
const DEV_DESTINOS = ['Vuelve a Full','Vuelve a nosotros (personal)'];

function calcDev(venta, motivo) {
  if (!venta) return {reintegro:0, penalidad:0};
  const bruto   = (venta.precioVenta||0) * (venta.cantidad||1);
  const cEnvio  = venta.costoEnvio || (CFG.costoEnvioMeli||0) * (venta.cantidad||1);
  if (motivo === 'Problema del producto') {
    // Meli devuelve el bruto pero descuenta envío ida + envío vuelta
    const penalidad = cEnvio * 2;
    return {reintegro: bruto - penalidad, penalidad};
  }
  // Arrepentimiento → reintegro total del precio bruto
  return {reintegro: bruto, penalidad: 0};
}

function saveEditDev(id) {
  const idx = DB.d.findIndex(x => x.id === id);
  if (idx < 0) return;
  DB.d[idx] = {
    ...DB.d[idx],
    fecha:           devF.fecha,
    motivo:          devF.motivo,
    destino:         devF.destino,
    nc:              devF.nc || '',
    reintegro:       +devF.reintegro || 0,
    penalidad:       +devF.penalidad || 0,
    otrosGastos:     +devF.otrosGastos || 0,
    otrosGastosDesc: devF.otrosGastosDesc || '',
    notas:           devF.notas || '',
  };
  dbSave('d'); mClose(); rview();
}

function dDev(id) {
  if (!confirm('¿Eliminar esta devolución?')) return;
  DB.d = DB.d.filter(x=>x.id!==id); dbSave('d'); rview();
}


function vGast() {
  const now = new Date();
  const tm = DB.g.filter(g=>{
    const d=new Date(g.fecha);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&g.categoria!=='Tasa';
  }).reduce((s,g)=>s+g.monto,0);
  const tt = DB.g.filter(g=>{
    const d=new Date(g.fecha);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&g.categoria==='Tasa';
  }).reduce((s,g)=>s+g.monto,0);
  const rows = [...DB.g].reverse().map(g => {
    const esTasa = g.categoria==='Tasa';
    return `<tr>
      <td>${fmtD(g.fecha)}</td>
      <td><span class="badge badge-${esTasa?'green':'blue'}">${g.categoria}</span></td>
      <td>${g.descripcion}</td>
      <td class="mono" style="color:${esTasa?'var(--green)':'var(--amber)'}">${esTasa?'+':''}${ARS(g.monto)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="dGas('${g.id}')">Eliminar</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Gastos / Ingresos</div>
        <div class="page-sub">
          Este mes — Gastos: <strong style="color:var(--amber)">${ARS(tm)}</strong>
          ${tt>0?`&nbsp;·&nbsp; Tasa: <strong style="color:var(--green)">${ARS(tt)}</strong>`:''}
        </div>
      </div>
      <button class="btn btn-primary" onclick="oNewG()">+ Nuevo registro</button>

    <div class="card">
      <div class="tbl-wrap">
        <table id="tbl-gastos">
          <thead><tr>${fth('Fecha','tbl-gastos',0)}${fth('Categoría','tbl-gastos',1)}${fth('Descripción','tbl-gastos',2)}${fth('Monto','tbl-gastos',3)}<th></th></tr></thead>

function saveGas() {
  const d = document.getElementById('g-d').value.trim();
  const m = +document.getElementById('g-m').value;
  if (!d || !m) return alert('Completá descripción y monto');
  DB.g.push({id:uid(), fecha:document.getElementById('g-f').value, categoria:document.getElementById('g-c').value, descripcion:d, monto:m});
  dbSave('g'); mClose(); rview();
}
function dGas(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  DB.g = DB.g.filter(x=>x.id!==id); dbSave('g'); rview();
}

// ─── FLUJO DE CAJA ────────────────────────────────────────────────────────────
function vCaja() {
  const all = [
    ...DB.v.map(v => ({fecha:v.fecha, tipo:'i', con:`Venta${v.cliente?` — ${v.cliente}`:''}`, monto:v.total})),
    ...DB.l.map(l => ({fecha:l.fecha, tipo:'e', con:`Compra${l.proveedor?` — ${l.proveedor}`:''}`, monto:l.total})),
    ...DB.g.map(g => ({fecha:g.fecha, tipo:g.categoria==='Tasa'?'i':'e', con:`${g.categoria}: ${g.descripcion}`, monto:g.monto})),
  ].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

  const saldo = all.reduce((s,m) => m.tipo==='i' ? s+m.monto : s-m.monto, 0);
  let run = saldo;
  all.forEach(m => { m.sal = run; run -= m.tipo==='i' ? m.monto : -m.monto; });

  const rows = all.map(m => `<tr>
    <td>${fmtD(m.fecha)}</td>
    <td><span class="badge badge-${m.tipo==='i'?'green':'amber'}">${m.tipo==='i'?'▲ Ingreso':'▼ Egreso'}</span></td>
    <td style="font-size:12px">${m.con}</td>
    <td class="mono" style="color:${m.tipo==='i'?'var(--green)':'var(--amber)'}">${m.tipo==='e'?'−':''}${ARS(m.monto)}</td>
    <td class="mono" style="color:${m.sal>=0?'var(--text)':'var(--red)'}">${ARS(m.sal)}</td>
  </tr>`).join('');

  return `
    <div class="page-header">
      <div><div class="page-title">Flujo de caja</div><div class="page-sub">Todos los movimientos de dinero</div></div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;text-align:right">
        <div style="font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.4px">Saldo actual</div>
        <div class="mono" style="font-size:20px;font-weight:600;color:${saldo>=0?'var(--green)':'var(--red)'}">${ARS(saldo)}</div>
      </div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table id="tbl-caja">
          <thead><tr>${fth('Fecha','tbl-caja',0)}${fth('Tipo','tbl-caja',1)}${fth('Concepto','tbl-caja',2)}${fth('Monto','tbl-caja',3)}${fth('Saldo acum.','tbl-caja',4)}</tr></thead>
          <tbody>${rows||`<tr><td colspan="5"><div class="empty"><div class="empty-icon">⇌</div><div class="empty-text">Sin movimientos</div></div></td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
}

// ─── RESULTADOS ───────────────────────────────────────────────────────────────
function resMonthData(y, m) {
  const fv = DB.v.filter(x=>{const d=new Date(x.fecha);return d.getMonth()===m&&d.getFullYear()===y;});
  const fg = DB.g.filter(x=>{const d=new Date(x.fecha);return d.getMonth()===m&&d.getFullYear()===y;});

  // Ventas brutas (precio × cant) — nuevo formato; fallback a total para registros viejos
  const ventas    = fv.reduce((s,v)=>s+((v.precioVenta&&v.cantidad)?v.precioVenta*v.cantidad:(v.total||0)),0);
  const cmv       = fv.reduce((s,v)=>s+(v.costoU&&v.cantidad?v.costoU*v.cantidad:0),0);
  const utilBruta = ventas - cmv;

  // Deducibles de venta
  const costoEnvio   = fv.reduce((s,v)=>s+(v.costoEnvio||0),0);
  const comisionML   = fv.reduce((s,v)=>s+(v.comisionML||0),0);
  const iibbVentas   = fv.reduce((s,v)=>s+(v.iibb||0),0);

  // Gastos por categoría
  const gastosCat = {};
  CATS.forEach(cat=>{
    gastosCat[cat]=fg.filter(g=>g.categoria===cat).reduce((s,g)=>s+g.monto,0);
  });

  // Impuestos = IIBB ventas + categoría Impuestos de gastos
  const impuestos      = iibbVentas + (gastosCat['Impuestos']||0);
  const totalDedVenta  = costoEnvio + comisionML + impuestos;

  // Devoluciones del período
  const fd          = (DB.d||[]).filter(x=>{const d=new Date(x.fecha);return d.getMonth()===m&&d.getFullYear()===y;});
  const reintegros     = fd.reduce((s,d)=>s+(d.reintegro||0),0);
  const penalidades    = fd.reduce((s,d)=>s+(d.penalidad||0),0);
  const otrosGastosDev = fd.reduce((s,d)=>s+(d.otrosGastos||0),0);

  const facturacionNeta = utilBruta - totalDedVenta - reintegros - penalidades - otrosGastosDev;

  // Gastos operativos (excluye Impuestos y Tasa)
  const gastoOp = CATS_OP.reduce((s,c)=>s+(gastosCat[c]||0),0);

  // Tasa = ingreso financiero (suma, no resta)
  const tasa     = gastosCat['Tasa']||0;
  const utilNeta = facturacionNeta - gastoOp + tasa;
  const pctUV    = ventas>0 ? utilNeta/ventas*100           : null;
  const margen   = ventas>0 ? facturacionNeta/ventas*100    : null;
  const facMin   = margen   ? gastoOp/(margen/100)          : null;

  return {
    ventas, cmv, utilBruta,
    costoEnvio, comisionML, impuestos, totalDedVenta,
    reintegros, penalidades, otrosGastosDev,
    facturacionNeta, gastosCat, gastoOp,
    tasa, utilNeta, pctUV, margen, facMin
  };
}

// rango libre para resultados
let rDesde = '', rHasta = '', rMes1 = '', rAnioSel = 0;

function vRes() {
  const now = new Date();

  // Construir lista de meses según el período seleccionado
  let months = [];
  if (rPer==='anioSel' && rAnioSel) {
    const isCurrentYear = rAnioSel === now.getFullYear();
    const lastMonth = isCurrentYear ? now.getMonth() : 11;
    for(let m=0; m<=lastMonth; m++) months.push({y:rAnioSel, m});
  } else if (rPer==='mes1' && rMes1) {
    const [y,m] = rMes1.split('-').map(Number);
    months = [{y, m: m-1}];
  } else if (rPer==='rango' && rDesde && rHasta) {
    const [dy,dm] = rDesde.split('-').map(Number);
    const [hy,hm] = rHasta.split('-').map(Number);
    let cy=dy, cm=dm-1;
    const ey=hy, em=hm-1;
    while(cy<ey||(cy===ey&&cm<=em)) {
      months.push({y:cy,m:cm});
      cm++; if(cm>11){cm=0;cy++;}
    }
  } else if (rPer==='anio') {
    for(let m=0;m<=now.getMonth();m++) months.push({y:now.getFullYear(),m});
  } else if (rPer==='6m') {
    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()});}
  } else {
    for(let i=2;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({y:d.getFullYear(),m:d.getMonth()});}
  }

  const mData  = months.map(({y,m})=>resMonthData(y,m));
  const labels = months.map(({y,m})=>`${MN[m]}-${String(y).slice(2)}`);

  // Columna TOTAL
  const tot = {
    ventas:           mData.reduce((s,d)=>s+d.ventas,0),
    cmv:              mData.reduce((s,d)=>s+d.cmv,0),
    utilBruta:        mData.reduce((s,d)=>s+d.utilBruta,0),
    costoEnvio:       mData.reduce((s,d)=>s+d.costoEnvio,0),
    comisionML:       mData.reduce((s,d)=>s+d.comisionML,0),
    impuestos:        mData.reduce((s,d)=>s+d.impuestos,0),
    totalDedVenta:    mData.reduce((s,d)=>s+d.totalDedVenta,0),
    reintegros:       mData.reduce((s,d)=>s+d.reintegros,0),
    penalidades:      mData.reduce((s,d)=>s+d.penalidades,0),
    otrosGastosDev:   mData.reduce((s,d)=>s+(d.otrosGastosDev||0),0),
    gastosCat:        {},
    gastoOp:          mData.reduce((s,d)=>s+d.gastoOp,0),
    tasa:             mData.reduce((s,d)=>s+d.tasa,0),
    utilNeta:         mData.reduce((s,d)=>s+d.utilNeta,0),
  };
  CATS.forEach(cat=>{ tot.gastosCat[cat]=mData.reduce((s,d)=>s+(d.gastosCat[cat]||0),0); });
  tot.pctUV  = tot.ventas>0 ? tot.utilNeta/tot.ventas*100        : null;
  tot.margen = tot.ventas>0 ? tot.facturacionNeta/tot.ventas*100 : null;
  tot.facMin = tot.margen   ? tot.gastoOp/(tot.margen/100)       : null;

  const cols   = [...mData, tot];
  const allLbl = [...labels, 'Total'];
  const nCols  = cols.length;

  // ── helpers de celda ──
  const dash = `<span style="color:var(--text3)">—</span>`;

  function cARS(v, opts={}) {
    if(v===null||v===undefined||v===0) return dash;
    const neg = opts.neg && v>0;   // mostrar entre paréntesis
    const color = opts.color||(neg?'var(--red)':v<0?'var(--red)':'');
    const txt = neg ? `(${ARS(Math.abs(v))})` : ARS(Math.abs(v));
    return `<span class="mono" style="font-size:12px${color?`;color:${color}`:''}${v<0&&!neg?';color:var(--red)':''}${opts.bold?';font-weight:700':''}">${v<0&&!neg?`(${ARS(Math.abs(v))})`:txt}</span>`;
  }
  function cPct(v, opts={}) {
    if(v===null||v===undefined) return dash;
    const color = v>0?'var(--green)':v<0?'var(--red)':'var(--text3)';
    return `<span class="mono" style="font-size:12px;color:${color}${opts.bold?';font-weight:700':''}">${v.toFixed(0)}%</span>`;
  }

  // ── constructores de fila ──
  const isLast = i => i===nCols-1;

  function rowHeader(label) {
    return `<tr>
      <td colspan="${nCols+1}" style="background:var(--brand);color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 14px">${label}</td>
    </tr>`;
  }

  function rowSep() {
    return `<tr><td colspan="${nCols+1}" style="padding:0;height:1px;background:var(--border)"></td></tr>`;
  }

  function row(label, getter, opts={}) {
    const tds = cols.map((d,i)=>{
      const v=getter(d);
      const base=`padding:8px 12px;text-align:right;${isLast(i)?'border-left:2px solid var(--border);background:var(--bg3)':''}`;
      const cell = opts.pct ? cPct(v,{bold:isLast(i)||opts.bold}) : cARS(v,{...opts,bold:isLast(i)||opts.bold});
      return `<td style="${base}">${cell}</td>`;
    }).join('');
    const lStyle=`padding:8px 14px;font-size:${opts.indent?'12':'13'}px;${opts.indent?'color:var(--text2);padding-left:28px':''}${opts.bold?';font-weight:700':''}${opts.subtotal?';font-weight:600;background:var(--bg3)':''}`;
    return `<tr style="${opts.subtotal?'border-top:2px solid var(--border)':''}">
      <td style="${lStyle}">${label}</td>${tds}
    </tr>`;
  }

  // ── encabezado de columnas ──
  const thCols = allLbl.map((l,i)=>`<th style="text-align:right;padding:10px 12px;${isLast(i)?'border-left:2px solid var(--border);background:var(--bg3)':''}">${l}</th>`).join('');

  return `
    <div class="page-header" style="flex-wrap:wrap;gap:12px">
      <div><div class="page-title">Estado de resultados</div><div class="page-sub">Comparativa mensual — datos de Ventas, Lotes y Gastos</div></div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px">
        ${[{v:'3m',l:'3 meses'},{v:'6m',l:'6 meses'},{v:'anio',l:'Año actual'}].map(o=>
          `<button class="btn-seg${rPer===o.v?' active':''}" onclick="rPer='${o.v}';rview()">${o.l}</button>`
        ).join('')}
        <div style="margin-left:4px;padding-left:8px;border-left:1px solid var(--border)">
          <select style="padding:6px 10px;font-size:12px;border:1px solid ${rPer==='anioSel'?'var(--brand)':'var(--border2)'};border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;font-weight:${rPer==='anioSel'?'600':'400'}"
            onchange="if(this.value){rPer='anioSel';rAnioSel=+this.value;rview();}else{rPer='6m';rview();}">
            <option value="">Año específico…</option>
            ${Array.from({length: now.getFullYear()-2025+1}, (_,i)=>2025+i).map(y=>`<option value="${y}"${rPer==='anioSel'&&rAnioSel===y?' selected':''}>${y}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table style="table-layout:auto">
          <thead>
            <tr style="background:var(--brand-dark)">
              <th style="padding:10px 14px;color:#fff;font-size:11px;text-align:left;min-width:190px">Estado de Resultados</th>
              ${allLbl.map((l,i)=>`<th style="text-align:right;padding:10px 12px;color:#fff;font-size:12px;font-weight:600;white-space:nowrap;${isLast(i)?'border-left:2px solid rgba(255,255,255,.3)':''}">${l}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rowHeader('Ventas')}
            ${row('Ventas brutas',         d=>d.ventas,          {})}
            ${row('CMV',                   d=>d.cmv,             {indent:true, neg:true})}
            ${rowSep()}
            ${row('Utilidad Bruta',        d=>d.utilBruta,       {bold:true, subtotal:true})}
            ${rowHeader('Deducibles de venta')}
            ${row('Costo Envío Meli',      d=>d.costoEnvio,      {indent:true, neg:true})}
            ${row('Comisión ML',           d=>d.comisionML,      {indent:true, neg:true})}
            ${row('Impuestos (IIBB + cat.)', d=>d.impuestos,     {indent:true, neg:true})}
            ${row('Devoluciones',           d=>d.reintegros,        {indent:true, neg:true})}
            ${row('Penalidades envío dev.',  d=>d.penalidades,       {indent:true, neg:true})}
            ${row('Otros gastos dev.',       d=>d.otrosGastosDev||0, {indent:true, neg:true})}
            ${rowSep()}
            ${row('Facturación Neta',      d=>d.facturacionNeta, {bold:true, subtotal:true})}
            ${rowHeader('Gastos operativos')}
            ${CATS_OP.map(cat=>row(cat,    d=>d.gastosCat[cat]||0,{indent:true, neg:true})).join('')}
            ${rowSep()}
            ${row('Subtotal Gastos Op.',   d=>d.gastoOp,         {neg:true, bold:true, subtotal:true})}
            ${rowHeader('Gastos / Ingresos varios')}
            ${row('Tasa (rend. fondo)',    d=>d.tasa,            {indent:true, color:'var(--green)'})}
            ${rowSep()}
            ${row('Utilidad Neta',         d=>d.utilNeta,        {bold:true, subtotal:true})}
            ${row('Utilidad / Ventas %',   d=>d.pctUV,           {pct:true})}
            ${rowHeader('Punto de equilibrio')}
            ${row('Margen Neto %',         d=>d.margen,          {pct:true})}
            ${row('Facturación mínima necesaria', d=>d.facMin,   {})}
          </tbody>
        </table>
      </div>
    </div>`;
}

        <div class="grid2">

const USD_TIPOS = ['Compra USD','Venta USD','Entrada (cobro)','Salida (pago)','Transferencia interna'];
const USD_UBIC  = ['Cash — en mano','Banco — cuenta propia','Banco — cuenta tercero','Caja fuerte','Billetera digital'];

function fmtUSD(n) {
  return new Intl.NumberFormat('es-AR', {style:'currency', currency:'USD', maximumFractionDigits:2}).format(n||0);
}

function saldoUSD() {
  return DB.u.reduce((s,m) => {
    const es = ['Compra USD','Entrada (cobro)'];
    return es.includes(m.tipo) ? s + m.montoUsd : s - m.montoUsd;
  }, 0);
}

function vUsd() {
  const saldo = saldoUSD();
  // resumen por ubicación
  const porUbic = {};
  DB.u.forEach(m => {

    return `<tr>

    <div class="card">
      <div class="tbl-wrap">

function exportDB() {
  const fecha = new Date().toISOString().slice(0,10);
  const data  = JSON.stringify({version:1, fecha, ...DB}, null, 2);
  const blob  = new Blob([data], {type:'application/json'});
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = `tjtech-backup-${fecha}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importDB(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!confirm(`¿Importar backup del ${data.fecha||'?'}?\n\nEsto va a REEMPLAZAR todos los datos actuales.`)) return;
      // Actualizar tanto DB local como window.DB
      if (data.p) { DB.p = data.p; window.DB.p = data.p; }
      if (data.l) { DB.l = data.l; window.DB.l = data.l; }
      if (data.v) { DB.v = data.v; window.DB.v = data.v; }
      if (data.g) { DB.g = data.g; window.DB.g = data.g; }
      if (data.u) { DB.u = data.u; window.DB.u = data.u; }
      if (data.d) { DB.d = data.d; window.DB.d = data.d; }
      // Guardar en Firestore uno a uno para no saturar
      for (const k of Object.keys(SK)) {
        await dbSave(k);
      }
      alert('✓ Datos importados correctamente');
      rview();
    } catch(err) {
      console.error('Error importando:', err);
      alert('Error al importar: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const tableFilters = {}; // { tableId: { colIdx: { selected: Set, sort: 'asc'|'desc'|null } } }

function initFilter(tableId) {
  if (!tableFilters[tableId]) tableFilters[tableId] = {};
}

function getColType(values) {
  const nums  = values.filter(v => v !== '' && !isNaN(v.replace(/[$,. ]/g,'')));
  const dates = values.filter(v => /\d{1,2}\/\d{1,2}\/\d{4}/.test(v));
  if (dates.length > values.length * 0.5) return 'date';
  if (nums.length  > values.length * 0.5) return 'number';
  return 'text';
}

function sortVal(v, type) {
  if (type === 'number') return parseFloat(v.replace(/[$,. ]/g,'').replace(/\./g,'').replace(',','.')) || 0;
  if (type === 'date')   { const p=v.split('/'); return p.length===3?new Date(p[2],p[1]-1,p[0]).getTime():0; }
  return v.toLowerCase();
}

function openFilterDropdown(tableId, colIdx, thEl) {
  // Cerrar cualquier dropdown abierto
  document.querySelectorAll('.filter-dropdown.open').forEach(d => d.classList.remove('open'));

  const table = document.getElementById(tableId);
  if (!table) return;

  // Recolectar valores únicos de la columna
  const rows   = Array.from(table.querySelectorAll('tbody tr'));
  const allVals = rows.map(r => {
    const td = r.querySelectorAll('td')[colIdx];
    return td ? td.innerText.trim() : '';
  }).filter(v => v && v !== '—');
  const unique = [...new Set(allVals)].sort();
  const type   = getColType(unique);
  unique.sort((a,b) => sortVal(a,type) < sortVal(b,type) ? -1 : 1);

  initFilter(tableId);
  if (!tableFilters[tableId][colIdx]) tableFilters[tableId][colIdx] = { selected: new Set(unique), sort: null };
  const state = tableFilters[tableId][colIdx];

  // Crear dropdown
  let dd = document.getElementById('filter-dd');
  if (!dd) { dd = document.createElement('div'); dd.id='filter-dd'; dd.className='filter-dropdown'; document.body.appendChild(dd); }

  dd.innerHTML = `
    <input class="filter-search" placeholder="Buscar..." oninput="filterSearch(this.value,'${tableId}',${colIdx})">
    <div class="filter-sort-btns">
      <button class="filter-sort-btn${state.sort==='asc'?' active':''}" onclick="applySort('${tableId}',${colIdx},'asc')">▲ A → Z</button>
      <button class="filter-sort-btn${state.sort==='desc'?' active':''}" onclick="applySort('${tableId}',${colIdx},'desc')">▼ Z → A</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px;display:flex;justify-content:space-between">
      <span>Seleccionar:</span>
      <span style="cursor:pointer;color:var(--brand)" onclick="filterSelectAll('${tableId}',${colIdx},true)">Todo</span>
      &nbsp;|&nbsp;
      <span style="cursor:pointer;color:var(--brand)" onclick="filterSelectAll('${tableId}',${colIdx},false)">Ninguno</span>
    </div>
    <div class="filter-options" id="filter-opts">
      ${unique.map(v=>`
        <label class="filter-option">
          <input type="checkbox" value="${v.replace(/"/g,'&quot;')}" ${state.selected.has(v)?'checked':''}
            onchange="filterToggle('${tableId}',${colIdx},this.value,this.checked)">
          <span>${v}</span>
        </label>`).join('')}
    </div>
    <div class="filter-actions">
      <button class="filter-clear" onclick="clearFilter('${tableId}',${colIdx})">Limpiar</button>
      <button class="filter-apply" onclick="applyFilter('${tableId}',${colIdx})">Aplicar</button>
    </div>`;

  // Posicionar
  const rect = thEl.getBoundingClientRect();
  dd.style.left = Math.min(rect.left, window.innerWidth-290) + 'px';
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.classList.add('open');

  // Cerrar al click fuera
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!dd.contains(e.target) && !thEl.contains(e.target)) {
        dd.classList.remove('open');
        document.removeEventListener('click', handler);
      }
    });
  }, 0);
}

function filterSearch(q, tableId, colIdx) {
  const opts = document.querySelectorAll('#filter-opts .filter-option');
  opts.forEach(opt => {
    const txt = opt.querySelector('span').textContent.toLowerCase();
    opt.style.display = txt.includes(q.toLowerCase()) ? '' : 'none';
  });
}

function filterToggle(tableId, colIdx, val, checked) {
  initFilter(tableId);
  if (!tableFilters[tableId][colIdx]) return;
  if (checked) tableFilters[tableId][colIdx].selected.add(val);
  else         tableFilters[tableId][colIdx].selected.delete(val);
}

function filterSelectAll(tableId, colIdx, all) {
  const opts = document.querySelectorAll('#filter-opts .filter-option input');
  opts.forEach(cb => {
    cb.checked = all;
    filterToggle(tableId, colIdx, cb.value, all);
  });
}

function applySort(tableId, colIdx, dir) {
  initFilter(tableId);
  if (!tableFilters[tableId][colIdx]) tableFilters[tableId][colIdx] = { selected: new Set(), sort: null };
  tableFilters[tableId][colIdx].sort = tableFilters[tableId][colIdx].sort === dir ? null : dir;
  applyFilter(tableId, colIdx);
}

function applyFilter(tableId, colIdx) {
  const table  = document.getElementById(tableId);
  if (!table) return;
  const tbody  = table.querySelector('tbody');
  const rows   = Array.from(tbody.querySelectorAll('tr'));
  const filters = tableFilters[tableId] || {};

  // Aplicar visibilidad
  rows.forEach(r => {
    let show = true;
    Object.entries(filters).forEach(([ci, state]) => {
      if (!state.selected || state.selected.size === 0) return;
      const td = r.querySelectorAll('td')[+ci];
      const v  = td ? td.innerText.trim() : '';
      if (!state.selected.has(v)) show = false;
    });
    r.style.display = show ? '' : 'none';
  });

  // Ordenar si hay sort activo
  const sortState = Object.entries(filters).find(([ci, s]) => s.sort);
  if (sortState) {
    const [sci, ss] = sortState;
    const visible = rows.filter(r => r.style.display !== 'none');
    const allVals = visible.map(r => {
      const td = r.querySelectorAll('td')[+sci];
      return td ? td.innerText.trim() : '';
    });
    const type = getColType(allVals);
    visible.sort((a,b) => {
      const va = sortVal((a.querySelectorAll('td')[+sci]?.innerText||'').trim(), type);
      const vb = sortVal((b.querySelectorAll('td')[+sci]?.innerText||'').trim(), type);
      return ss.sort === 'asc' ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1);
    });
    visible.forEach(r => tbody.appendChild(r));
  }

  // Actualizar badges en headers
  table.querySelectorAll('th.th-filter').forEach((th, i) => {
    const f = filters[i];
    th.classList.remove('filtered','sorted-asc','sorted-desc');
    const badge = th.querySelector('.filter-badge');
    if (badge) badge.remove();
    if (f) {
      if (f.sort === 'asc')  th.classList.add('sorted-asc');
      if (f.sort === 'desc') th.classList.add('sorted-desc');
      const allVals = rows.map(r=>(r.querySelectorAll('td')[i]?.innerText||'').trim()).filter(v=>v&&v!=='—');
      const unique  = new Set(allVals);
      if (f.selected && f.selected.size < unique.size) {
        th.classList.add('filtered');
        const b = document.createElement('span');
        b.className = 'filter-badge';
        b.textContent = f.selected.size;
        th.querySelector('.th-inner').appendChild(b);
      }
    }
  });

  document.getElementById('filter-dd')?.classList.remove('open');
}

function clearFilter(tableId, colIdx) {
  if (tableFilters[tableId]) {
    delete tableFilters[tableId][colIdx];
  }
  applyFilter(tableId, colIdx);
  // Reabrir con todos seleccionados
  const th = document.querySelector(`#${tableId} th.th-filter:nth-child(${+colIdx+1})`);
  if (th) openFilterDropdown(tableId, colIdx, th);
}

function clearAllFilters(tableId) {
  tableFilters[tableId] = {};
  const table = document.getElementById(tableId);
  if (!table) return;
  table.querySelectorAll('tbody tr').forEach(r => r.style.display = '');
  table.querySelectorAll('th.th-filter').forEach(th => {
    th.classList.remove('filtered','sorted-asc','sorted-desc');
    th.querySelector('.filter-badge')?.remove();
  });
}

// Helper para generar th con filtro
function fth(label, tableId, colIdx) {
  return `<th class="th-filter" onclick="openFilterDropdown('${tableId}',${colIdx},this)">
    <div class="th-inner">${label}<span class="th-sort-icon">⊿</span></div>
  </th>`;
}
